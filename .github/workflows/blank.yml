name: CI

on:
  pull_request:
    branches: [ "main", "development", "developmentTeam1" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      # 1. Launch supabase
      - name: Start Supabase Local
        working-directory: project/back
        run: npx supabase start

      # 2. Quality Control: Backend Formatting
      - name: Check Backend Formatting (Spotless)
        working-directory: project/back
        run: mvn spotless:check

      # 3. Build & Tests backend
      - name: Build and Run Tests backend
        working-directory: project/back
        env:
          DATABASE_URL: jdbc:postgresql://127.0.0.1:5432/postgres
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          SPRING_AI_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: mvn -B clean verify

      # 4. Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: project/front
        run: npm install

      # 5. Quality Control: Frontend Linting & Formatting
      - name: Check Frontend Formatting (Prettier)
        working-directory: project/front
        run: npx prettier --check .

      - name: Check Frontend Linting (ESLint)
        working-directory: project/front
        run: npm run lint

      # 6. Build & Tests frontend
      - name: Build and Run Tests frontend
        working-directory: project/front
        run: npm test

      # 7. Archiving reports if failed
      - name: Archive Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            project/back/target/surefire-reports/
            project/back/target/failsafe-reports/