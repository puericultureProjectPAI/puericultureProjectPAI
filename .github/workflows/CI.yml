name: CI

on:
  pull_request:
    branches: [ "main", "dev" ]
    # Globally ignore files that have no impact on the build execution
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

jobs:
  # ==========================================
  # JOB 0: THE ROUTER (Diff Analysis)
  # ==========================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      # Lightweight checkout to analyze modifications
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'project/back/**'
              # Always trigger if the workflow itself is modified to ensure integrity
              - '.github/workflows/**' 
            frontend:
              - 'project/front/**'
              - '.github/workflows/**'

  # ==========================================
  # JOB 1: BACKEND PIPELINE
  # ==========================================
  backend:
    needs: detect-changes
    # Strict execution: run only if the "backend" filter returns true
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Supabase Docker images
        uses: actions/cache@v4
        with:
          path: /tmp/supabase-docker-cache
          key: supabase-${{ runner.os }}-${{ hashFiles('project/back/supabase/config.toml') }}
          restore-keys: |
            supabase-${{ runner.os }}-

      - name: Load cached Docker images (if any)
        run: |
          if [ -d /tmp/supabase-docker-cache ] && [ "$(ls -A /tmp/supabase-docker-cache/*.tar 2>/dev/null)" ]; then
            for tar in /tmp/supabase-docker-cache/*.tar; do docker load -i "$tar"; done
          fi

      - name: Start Supabase Local
        working-directory: project/back
        run: npx supabase start -x edge-runtime,storage-api,studio,realtime,imgproxy,logflare,vector

      - name: Save Docker images to cache
        run: |
          mkdir -p /tmp/supabase-docker-cache
          docker images --format '{{.Repository}}:{{.Tag}}' | grep supabase | while read img; do
            name=$(echo "$img" | tr '/:' '__')
            docker save "$img" -o "/tmp/supabase-docker-cache/${name}.tar"
          done

      - name: Check Backend Formatting (Spotless)
        working-directory: project/back
        run: mvn spotless:check

      - name: Build and Run Tests backend
        working-directory: project/back
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:54322/postgres
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SUPABASE_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
          OPENAI_API_KEY: dummy_key
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_SERVICE_KEY: dummy_service_key
          SUPABASE_STORAGE_BUCKET: puericulture-images
          SUPABASE_STORAGE_MAX_SIZE: 5242880
        run: mvn -B clean verify

  # ==========================================
  # JOB 2: FRONTEND PIPELINE
  # ==========================================
  frontend:
    needs: detect-changes
    # Strict execution: run only if the "frontend" filter returns true
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: project/front/package-lock.json

      - name: Install frontend dependencies
        working-directory: project/front
        # Strict requirement: Use 'npm ci' for deterministic builds, NEVER 'npm install'
        run: npm ci

      - name: Check Formatting & Linting
        working-directory: project/front
        run: |
          npx prettier --check .
          npm run lint

      - name: Build and Run Tests frontend
        working-directory: project/front
        run: npm test

  # ==========================================
  # JOB 3: CI GATEKEEPER (For Branch Protection Rules)
  # ==========================================
  ci-gatekeeper:
    # Must always execute to report final status, even if dependencies are skipped
    if: always()
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate Pipeline Status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "Error: One or more critical pipeline jobs failed or were cancelled."
            exit 1
          else
            echo "Success: Pipeline passed or jobs were safely skipped."
            exit 0
          fi