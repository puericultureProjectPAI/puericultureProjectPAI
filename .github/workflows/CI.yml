name: CI

on:
  pull_request:
    branches: [ "main", "dev" ]
    # Globally ignore files that have no impact on the build execution
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

jobs:
  # ==========================================
  # JOB 0: THE ROUTER (Diff Analysis)
  # ==========================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      # Lightweight checkout to analyze modifications
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'project/back/**'
              # Always trigger if the workflow itself is modified to ensure integrity
              - '.github/workflows/**' 
            frontend:
              - 'project/front/**'
              - '.github/workflows/**'

  # ==========================================
  # JOB 1: BACKEND PIPELINE
  # ==========================================
  backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Asynchronous infrastructure boot
      - name: Start Supabase (Background I/O)
        working-directory: project/back
        # We ruthlessly exclude everything that is not DB or Storage.
        # Kong, Auth, and Rest remain necessary for the operation of Storage.
        run: |
          supabase start --exclude realtime,edge-runtime,studio,inbucket,logflare,vector,pgadmin-schema-diff &
          echo "Démarrage de l'infrastructure délégué en arrière-plan..."

      # Latency absorption by the CPU compilation
      - name: Parallel CPU Task - Compile & Check
        working-directory: project/back
        # We download the dependencies and compile the classes (without running tests).
         # This phase will "hide" the startup time of Supabase.
        run: |
          mvn spotless:check
          mvn -B clean test-compile

      # Final sync
      - name: Tactical Wait (Synchronization)
        run: |
          echo "Attente de la confirmation de la Gateway (Kong)..."
          timeout=120
          counter=0
          until curl -s http://127.0.0.1:54321/rest/v1/ >/dev/null; do
            if [ $counter -gt $timeout ]; then
              echo "Échec : L'infrastructure n'a pas répondu à temps."
              exit 1
            fi
            sleep 2
            counter=$((counter + 2))
          done
          echo "Infrastructure Supabase alignée et opérationnelle."

      # Execution of the keystroke (The tests will run instantly because the code is already compiled)
      - name: Execute Tests
        working-directory: project/back
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:54322/postgres
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SUPABASE_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
          OPENAI_API_KEY: dummy_key
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_SERVICE_KEY: dummy_service_key
          SUPABASE_STORAGE_BUCKET: puericulture-images
          SUPABASE_STORAGE_MAX_SIZE: 5242880
        run: mvn -B verify

  # ==========================================
  # JOB 2: FRONTEND PIPELINE
  # ==========================================
  frontend:
    needs: detect-changes
    # Strict execution: run only if the "frontend" filter returns true
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: project/front/package-lock.json

      - name: Install frontend dependencies
        working-directory: project/front
        # Strict requirement: Use 'npm ci' for deterministic builds, NEVER 'npm install'
        run: npm ci

      - name: Check Formatting & Linting
        working-directory: project/front
        run: |
          npx prettier --check .
          npm run lint

      - name: Build and Run Tests frontend
        working-directory: project/front
        run: npm test

  # ==========================================
  # JOB 3: CI GATEKEEPER (For Branch Protection Rules)
  # ==========================================
  ci-gatekeeper:
    # Must always execute to report final status, even if dependencies are skipped
    if: always()
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate Pipeline Status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "Error: One or more critical pipeline jobs failed or were cancelled."
            exit 1
          else
            echo "Success: Pipeline passed or jobs were safely skipped."
            exit 0
          fi