server:
  # On écoute sur PORT (standard Render) et on tombe sur 8080 en local
  port: ${PORT:8080}
  servlet:
    # Définit /api par défaut, mais laisse la priorité à la variable d'environnement
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/api}

spring:
  application:
    name: projet-puericulture

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      # DANGEREUX EN PROD. Doit être écrasé par SPRING_JPA_HIBERNATE_DDL_AUTO=validate sur Render
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: ${SHOW_SQL:true}

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}

google:
  gemini:
    api-key: ${GOOGLE_GEMINI_API_KEY}
    url: ${GOOGLE_GEMINI_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent}

supabase:
  url: ${SUPABASE_URL}
  service:
    key: ${SUPABASE_SERVICE_KEY}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    web: TRACE
    org.springframework.security: INFO
    com.puericulture: DEBUG