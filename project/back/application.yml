server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: projet-puericulture

  # Configuration PostgreSQL (Supabase)
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Configuration de la sécurité (JWT stateless)
  security:
    jwt:
      secret: ${JWT_SECRET_KEY}
      token-validity: 86400 # 24 heures

# Documentation API (Swagger)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info

# Gestion des logs
logging:
  level:
    root: INFO
    org.springframework.security: INFO
    com.projetpuericulture: DEBUG