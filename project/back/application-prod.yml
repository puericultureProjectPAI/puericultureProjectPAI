spring:
  # Configuration Supabase Cloud via variables d'env
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}

  # Configuration IA (OpenRouter)
  ai:
    openai:
      base-url: https://openrouter.ai/api/v1
      api-key: ${OPENROUTER_API_KEY}
      chat:
        options:
          model: google/gemini-pro-1.5

  # Sécurité Stateless
  security:
    jwt:
      secret: ${JWT_SECRET_KEY}

# Monitoring restreint
management:
  endpoints:
    web:
      exposure:
        include: health,info